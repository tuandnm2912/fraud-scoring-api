services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fraud_scoring
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_scoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fraud_scoring
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_JWT_SECRET: YXBwLXNlY3JldC1tYXktYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLXVzZS1hLWxvbmdlci1yYW5kb20tc2VjcmV0
      APP_SEED_ADMIN_ENABLED: "true"
      APP_SEED_ADMIN_EMAIL: admin@demo.local
      APP_SEED_ADMIN_PASSWORD: Admin123!