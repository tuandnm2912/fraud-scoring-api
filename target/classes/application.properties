spring.application.name=fraud-scoring
# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fraud_scoring}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${APP_JWT_SECRET:YXBwLXNlY3JldC1tYXktYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLXVzZS1hLWxvbmdlci1yYW5kb20tc2VjcmV0}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_TOKEN_MINUTES:60}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_TOKEN_DAYS:7}

# Demo seed admin
app.seed-admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed-admin.email=${APP_SEED_ADMIN_EMAIL:admin@demo.local}
app.seed-admin.password=${APP_SEED_ADMIN_PASSWORD:Admin123!}

# Error hardening
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never